name: Majsoul-Login
on:
  workflow_dispatch:
  schedule: #15:00
   - cron: '0 7 * * *'
jobs:
  login:
    name: Majsoul-Login
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Selenium
        run: pip install selenium==4.17.2

      - name: Random delay
        run: |
          delay=$(shuf -i 0-7200 -n 1)
          echo "Wait ${delay}s before login"
          sleep "$delay"

      - name: Majsoul login
        run: python login.py ${{ secrets.EMAIL }} ${{ secrets.PASSWD }}
